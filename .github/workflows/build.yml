name: build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up gnu-efi and build-essential
        run: |
          sudo apt-get update
          sudo apt-get install -y gnu-efi build-essential

      - name: Build EFI driver
        run: |
          cd driver
          make
